<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanh Hoá Vibes</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    background: #020617;
}

nav {
    text-align: center;
    margin: 10px;
}

nav button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    background: #38bdf8;
    border-radius: 6px;
    cursor: pointer;
}

section {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin: 10px 0;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
    <h1>🌊 Thanh Hoá Vibes</h1>
</header>

<nav>
    <button onclick="show('home')">Trang chủ</button>
    <button onclick="show('places')">Địa điểm</button>
    <button onclick="show('food')">Ẩm thực</button>
    <button onclick="show('experience')">Trải nghiệm</button>
</nav>

<!-- HOME -->
<section id="home" class="active">
    <div class="card">
        <h2>Chào mừng</h2>
        <p>Khám phá Thanh Hoá với vibe cực chill 🌴</p>
    </div>
</section>

<!-- PLACES -->
<section id="places">
    <div class="card">
        <h2>📍 Địa điểm</h2>
        <p>🌊 Biển Sầm Sơn</p>
        <p>🏯 Thành Nhà Hồ</p>
        <p>🌿 Pù Luông</p>
    </div>
</section>

<!-- FOOD -->
<section id="food">
    <div class="card">
        <h2>🍜 Ẩm thực</h2>
        <p>Nem chua Thanh Hoá</p>
        <p>Bún chả cá</p>
        <p>Gỏi cá nhệch</p>
    </div>
</section>

<!-- EXPERIENCE -->
<section id="experience">
    <div class="card">
        <h2>🔥 Trải nghiệm</h2>
        <p>Tắm biển, trekking, check-in</p>
        <button onclick="alert('Thanh Hoá đáng đi lắm 😎')">
            Đi ngay
        </button>
    </div>
</section>

<script>
function show(id) {
    document.querySelectorAll("section").forEach(sec => {
        sec.classList.remove("active");
    });
    document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
